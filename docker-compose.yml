version: "3.9"

networks:
  sandbox:
    driver: bridge
  agent-net:
    driver: bridge
    internal: true    # agent-runner has no internet egress via this network

services:
  sqlserver:
    # azure-sql-edge has native ARM64 support; mssql/server:2022 segfaults under QEMU on Apple Silicon
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - sandbox
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - sandbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - sandbox
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  eshop:
    build: ./eshop
    container_name: eshop
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5001:80"
    environment:
      ASPNETCORE_URLS: "http://+:80"
      ASPNETCORE_ENVIRONMENT: "Docker"
      UseOnlyInMemoryDatabase: "true"
      Aspire__Seq__DisableHealthChecks: "true"
      Aspire__Seq__ServerUrl: "http://localhost:5341"
    networks:
      - sandbox
      - agent-net    # exposed to agent-runner; databases stay sandbox-only
    volumes:
      - ./output:/output
    healthcheck:
      # TCP check — confirms ASP.NET Core port is listening after startup
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/80'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s    # allows time for tests + dotnet startup
    deploy:
      resources:
        limits:
          memory: 1g

  medplum:
    build: ./medplum
    container_name: medplum
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8103:8103"
    environment:
      MEDPLUM_DATABASE_HOST: postgres
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_USERNAME: ${POSTGRES_USER}
      MEDPLUM_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      MEDPLUM_DATABASE_DBNAME: ${POSTGRES_DB}
      MEDPLUM_REDIS_HOST: redis
      MEDPLUM_REDIS_PORT: 6379
    networks:
      - sandbox
      - agent-net    # exposed to agent-runner; databases stay sandbox-only
    volumes:
      - ./output:/output
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8103/healthcheck > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s   # allows time for node startup + migrations + jest tests
    deploy:
      resources:
        limits:
          memory: 1g

  agent-runner:
    build: ./agent-runner
    container_name: agent-runner
    depends_on:
      eshop:
        condition: service_healthy
      medplum:
        condition: service_healthy
    environment:
      ESHOP_BASE_URL: "http://eshop:80"
      MEDPLUM_BASE_URL: "http://medplum:8103"
    networks:
      - agent-net    # can reach eshop + medplum; cannot reach sandbox DBs or internet
    volumes:
      - ./output:/output
    read_only: true          # overlay FS is read-only; only /tmp and /output are writable
    tmpfs:
      - /tmp               # writable scratch space for agent
    security_opt:
      - no-new-privileges:true    # blocks setuid/setgid privilege escalation
    deploy:
      resources:
        limits:
          cpus: "0.50"           # cap runaway agent loops
          memory: 256m
